// VERSION: 1.3.11
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2c3e50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    
    <title>v1.3.11 - שיר של יום</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@hebcal/core@latest/dist/bundle.min.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --secondary: #e74c3c; --bg: #f4f7f6; --text: #2d3436; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; direction: rtl; color: var(--text); }
        #app-root { display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; }
        h1 { color: var(--primary); margin: 10px 0; font-size: 1.5rem; }
        .version-tag { font-size: 0.8rem; color: #7f8c8d; margin-bottom: 15px; text-align: left; direction: ltr; }
        #psalm-title { font-size: 1.4rem; margin: 20px 0; border-bottom: 2px solid var(--bg); padding-bottom: 10px; color: var(--primary); }
        #psalm-content { font-size: 1.25rem; line-height: 1.8; text-align: justify; white-space: pre-wrap; min-height: 200px; }
        .controls { display: flex; gap: 10px; margin-top: 25px; width: 100%; max-width: 600px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; cursor: pointer; font-size: 1rem; }
        input[type="date"] { padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; font-family: inherit; }
        .moed-label { background: #fff3cd; color: #856404; padding: 5px 15px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app-root">
        <div class="card">
            <div class="version-tag">v1.3.11</div>
            <h1>שיר של יום - מנהג הגר"א</h1>
            <div id="moed-container"></div>
            <input type="date" id="date-input" onchange="pickDate(this.value)">
            
            <h2 id="psalm-title">טוען...</h2>
            <div id="psalm-content">מתחבר למקור הנתונים...</div>
        </div>

        <div class="controls">
            <button onclick="changeDate(1)">יום קודם</button>
            <button onclick="currentDate = new Date(); loadPsalm();">היום</button>
            <button onclick="changeDate(-1)">יום הבא</button>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let psalmsCache = null;

        const numToHeb = (n) => {
            const units = ["", "א", "ב", "ג", "ד", "ה", "ו", "ז", "ח", "ט"];
            const tens = ["", "י", "כ", "ל", "מ", "נ", "ס", "ע", "פ", "צ"];
            if (n === 15) return "טו"; if (n === 16) return "טז";
            let res = tens[Math.floor(n / 10)] + units[n % 10];
            return res || "א";
        };

        function determinePsalmKey(date) {
            const hDate = new hebcal.HDate(date);
            const dayOfWeek = hDate.getDay();
            const events = hebcal.Holidays.getHolidaysForDay(hDate) || [];
            
            for (let e of events) {
                const desc = e.render('he');
                if (desc.includes("ראש חודש")) return { key: "104", label: "ראש חודש" };
                if (desc.includes("חנוכה")) return { key: "30", label: desc };
                if (desc.includes("פורים") && !desc.includes("שושן")) return { key: "22", label: "פורים" };
                if (desc.includes("פסח")) return { key: "114", label: desc };
                if (desc.includes("שבועות")) return { key: "19", label: "שבועות" };
                if (desc.includes("ראש השנה")) return { key: "81", label: desc };
                if (desc.includes("יום כיפור")) return { key: "103", label: "יום כיפור" };
                if (desc.includes("סוכות") || desc.includes("שמיני עצרת")) return { key: "12", label: desc };
            }

            const weekly = ["24", "48", "82", "94_A", "81", "93", "92"];
            return { key: weekly[dayOfWeek], label: "" };
        }

        async function loadPsalm() {
            try {
                document.getElementById('date-input').value = currentDate.toISOString().split('T')[0];
                const info = determinePsalmKey(currentDate);
                document.getElementById('moed-container').innerHTML = info.label ? `<div class="moed-label">${info.label}</div>` : "";
                
                if (!psalmsCache) {
                    const response = await fetch('psalms.json');
                    psalmsCache = await response.json();
                }
                
                let data = psalmsCache[info.key];
                if (data) {
                    let baseNum = info.key.split('_')[0];
                    let titleText = "מזמור " + numToHeb(parseInt(baseNum));
                    if (info.key === "94_A") titleText += ", א'-ט\"ו";
                    document.getElementById('psalm-title').innerText = titleText;
                    
                    document.getElementById('psalm-content').innerText = 
                        (typeof data === 'object' ? Object.values(data).join(' ') : data).trim();
                }
            } catch (e) { 
                console.error(e);
                document.getElementById('psalm-content').innerText = "שגיאה בטעינת הנתונים משאב JSON.";
            }
        }

        function changeDate(d) { currentDate.setDate(currentDate.getDate() - d); loadPsalm(); }
        function pickDate(val) { if (val) { currentDate = new Date(val); loadPsalm(); } }
        
        window.onload = () => {
            let check = setInterval(() => {
                if (typeof hebcal !== 'undefined') { clearInterval(check); loadPsalm(); }
            }, 100);
        };
    </script>
</body>
</html>
